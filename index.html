<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - LabKom Al Umanaa</title>
    
    <!-- HUBUNGAN KE MANIFEST JSON UNTUK INSTALASI HP -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1565c0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LabKom">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        
        /* STYLE LOGO AL UMANAA BIAR PAS DI TENGAH */
        .logo-img { width: 90px; height: auto; margin-bottom: 15px; }
        
        h1 { color: #1565c0; font-size: 24px; margin-bottom: 4px; }
        p { color: #718096; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #4a5568; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,0.15); }
        button { width: 100%; padding: 12px; background: #1565c0; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #0d47a1; }
        
        /* Tombol Pemicu Instalasi Aplikasi HP */
        .btn-install-app { display: none; margin-top: 15px; background: #2ecc71; color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- LOGO AL UMANAA RESMI -->
        <img src="logo.png.png" alt="Logo Al Umanaa" class="logo-img">
        
        <h1>LABKOM AL UMANAA</h1>
        <p>Sistem Informasi Booking Perangkat v2.0</p>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
        </div>
        <button onclick="prosesLogin()">MASUK KE PANEL</button>
        
        <!-- Tombol sakti otomatis muncul kalau HP mendukung instalasi -->
        <button id="installBtn" class="btn-install-app">📲 INSTAL APLIKASI DI HP</button>
    </div>

    <script>
        function prosesLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'labkom' && pass === 'prima') {
                window.location.href = 'dashboard.html';
            } else {
                alert('Username atau Password salah, Bos!');
            }
        }

        // ================= KODE PEMICU INSTALASI PWA =================
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';

            installBtn.addEventListener('click', () => {
                installBtn.style.display = 'none';
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User menginstal aplikasi LabKom');
                    }
                    deferredPrompt = null;
                });
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGZ1bmN0aW9uKGV2ZW50KSB7fSk7')
            .catch(err => console.log("SW log:", err));
        }
    </script>
</body>
</html>
