<!DOCTYPE html>
<html>

<head>
    <title>LabKom - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #1565c0;
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header img {
            width: 110px;
            background: white;
            border-radius: 20px;
            padding: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 26px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 15px;
            opacity: 0.9;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }

        .login-box h2 {
            text-align: center;
            color: #1565c0;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a5568;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #1565c0;
            box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #0d47a1;
        }

        /* Gaya pesan error ghaib */
        .error-message {
            color: #e53935;
            background: #ffebee;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>

<body>

    <header>
        <img src="logo.png.png" alt="Logo Al Umanaa">
        <h1>LABORATORIUM KOMPUTER</h1>
        <p>Pondok Pesantren Modern Al Umanaa</p>
    </header>

    <div class="login-container">
        <div class="login-box">
            <h2>SISTEM LOGIN</h2>
            
            <div class="error-message" id="errorBox">Username atau Password Salah!</div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan Username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan Password">
            </div>
            
            <button type="button" onclick="cekLogin()">MASUK</button>
        </div>
    </div>

    <script>
        function cekLogin() {
            // Ambil apa yang diketik user
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            var errorBox = document.getElementById('errorBox');

            // Validasi kecocokan data kuncinya
            if (user === 'labkom' && pass === 'prima') {
                errorBox.style.display = 'none';
                // Lempar ke halaman dashboard
                window.location.href = "dashboard.html";
            } else {
                // Tampilkan kotak merah kalau salah
                errorBox.style.display = 'block';
                // Reset form password biar diisi ulang
                document.getElementById('password').value = "";
            }
        }

        // Bonus fiturnya: kalau pencet enter di keyboard pas ngetik password, otomatis login!
        document.getElementById("password").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                cekLogin();
            }
        });
    </script>

</body>

</html>
